<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product – VyaparTrack</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" href="assets/Logow.png" />
  <style>
    .pay-mode-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .pay-mode-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;}
    .pay-mode-btn.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
    .section-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);padding-bottom:10px;border-bottom:1px solid var(--border);margin:20px 0 16px;}
    .due-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;}
    .due-badge.pending{background:var(--warning-light);color:var(--warning);}
    .due-badge.cleared{background:var(--success-light);color:var(--success);}
  </style>
</head>
<body>
<script src="js/config.js"></script>
<script type="module" src="js/product-page.js"></script>
</body>
</html>
